version: "3.8"

services:
  web:
    build: .
    container_name: youtube-downloader
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - downloads:/app/downloads
    environment:
      - FLASK_ENV=production
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  downloads:
